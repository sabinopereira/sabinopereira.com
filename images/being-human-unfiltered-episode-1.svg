<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Being Human (Unfiltered) — Episode 1</title>
  <desc id="desc">A warm editorial illustration of two anonymous figures sitting together by an airport window at sunset.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2b3128"/>
      <stop offset="0.42" stop-color="#b46d43"/>
      <stop offset="0.72" stop-color="#e7b46b"/>
      <stop offset="1" stop-color="#2b3028"/>
    </linearGradient>
    <linearGradient id="room" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#171c17" stop-opacity="0.1"/>
      <stop offset="0.52" stop-color="#131711" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#11140f"/>
    </linearGradient>
    <radialGradient id="sun" cx="58%" cy="34%" r="42%">
      <stop offset="0" stop-color="#ffd28a" stop-opacity="0.95"/>
      <stop offset="0.42" stop-color="#e89a57" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#161a14" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGrain">
      <feTurbulence type="fractalNoise" baseFrequency="0.78" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.08"/>
      </feComponentTransfer>
    </filter>
    <filter id="blur">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="#141812"/>
  <rect width="1600" height="900" fill="url(#sky)"/>
  <rect width="1600" height="900" fill="url(#sun)"/>
  <rect width="1600" height="900" fill="url(#room)"/>

  <g opacity="0.32" filter="url(#blur)">
    <ellipse cx="1010" cy="404" rx="142" ry="18" fill="#f2c47a"/>
    <ellipse cx="1160" cy="423" rx="96" ry="13" fill="#f2c47a"/>
    <ellipse cx="694" cy="396" rx="84" ry="12" fill="#f2c47a"/>
  </g>

  <g opacity="0.8">
    <rect x="172" y="0" width="24" height="900" fill="#11140f"/>
    <rect x="504" y="0" width="26" height="900" fill="#11140f"/>
    <rect x="827" y="0" width="28" height="900" fill="#11140f"/>
    <rect x="1168" y="0" width="26" height="900" fill="#11140f"/>
    <rect x="1430" y="0" width="24" height="900" fill="#11140f"/>
    <rect x="0" y="654" width="1600" height="28" fill="#11140f"/>
  </g>

  <g opacity="0.5">
    <path d="M930 496c88-50 188-86 300-108 50-10 91-10 123 0-52 18-118 35-197 52-83 17-158 36-226 56Z" fill="#293226"/>
    <path d="M1086 394l112 24-18 20-132-4Z" fill="#1b2119"/>
    <circle cx="1324" cy="407" r="7" fill="#f7cf81"/>
    <circle cx="1386" cy="415" r="5" fill="#f7cf81"/>
  </g>

  <g>
    <rect x="0" y="704" width="1600" height="196" fill="#10130e"/>
    <path d="M148 734c204-40 442-54 718-42 246 10 442 36 586 76v132H148Z" fill="#171b14"/>
    <path d="M0 780c226-38 510-48 852-28 310 18 560 50 748 96v52H0Z" fill="#0f120d"/>
  </g>

  <g fill="#0c0f0b">
    <ellipse cx="740" cy="575" rx="92" ry="108"/>
    <path d="M652 632c26-72 78-110 148-112 64 24 106 86 126 188H634c0-29 6-55 18-76Z"/>
    <ellipse cx="868" cy="586" rx="77" ry="96"/>
    <path d="M812 646c22-62 62-94 120-94 58 26 94 78 108 156H774c8-28 21-49 38-62Z"/>
  </g>

  <g opacity="0.92" fill="none" stroke-linecap="round">
    <path d="M799 647c30 32 66 51 108 57" stroke="#2a2f23" stroke-width="24"/>
    <path d="M662 662c56 40 116 57 180 50" stroke="#22271d" stroke-width="30"/>
  </g>

  <g opacity="0.18">
    <path d="M101 682c16-116 50-210 102-282" stroke="#1b2218" stroke-width="16" fill="none"/>
    <ellipse cx="180" cy="356" rx="42" ry="88" fill="#151b14" transform="rotate(22 180 356)"/>
    <ellipse cx="118" cy="452" rx="38" ry="82" fill="#141a13" transform="rotate(-28 118 452)"/>
    <ellipse cx="226" cy="482" rx="34" ry="74" fill="#141a13" transform="rotate(36 226 482)"/>
